apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  interval: 5m
  chart:
    spec:
      chart: podinfo
      version: "6.x"
      sourceRef:
        kind: HelmRepository
        name: podinfo-repository
        namespace: podinfo
  values:
    replicaCount: 1
    service:
      type: ClusterIP
    ingress:
      enabled: false
